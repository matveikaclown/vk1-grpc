services:
  tarantool:
    image: tarantool/tarantool:3.2
    container_name: tarantool-kv
    ports:
      - "3301:3301"
    volumes:
      - ./init.lua:/opt/tarantool/init.lua
      - tarantool_data:/var/lib/tarantool
    command: ["tarantool", "/opt/tarantool/init.lua"]
    tty: true
    stdin_open: true
    restart: unless-stopped

volumes:
  tarantool_data: